name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.22.x", "1.24.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Check formatting
        if: runner.os != 'Windows'
        run: test -z "$(gofmt -l .)"

      - name: Go mod tidy check
        if: runner.os != 'Windows'
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Go vet
        run: go vet ./...

      - name: Tests
        run: go test ./...

      - name: Race tests
        if: runner.os != 'Windows'
        run: go test -race ./...

      - name: Build all packages
        run: go build ./...

      - name: Build CLI
        run: go build -ldflags "-X github.com/bagadi-alnour/todo-cli/internal/cmd.Version=${{ github.ref_name }} -X github.com/bagadi-alnour/todo-cli/internal/cmd.BuildDate=ci -X github.com/bagadi-alnour/todo-cli/internal/cmd.Commit=${{ github.sha }}" ./cmd/todo
