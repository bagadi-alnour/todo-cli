version: 2

project_name: todo

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/todo
    binary: todo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/bagadi-alnour/todo-cli/internal/cmd.Version={{.Version}} -X github.com/bagadi-alnour/todo-cli/internal/cmd.BuildDate={{.Date}} -X github.com/bagadi-alnour/todo-cli/internal/cmd.Commit={{.ShortCommit}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: bagadi-alnour
    name: todo-cli
